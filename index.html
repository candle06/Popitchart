<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>템 시세 시스템</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#111;color:white;font-family:sans-serif;padding:20px;}
input,button,select{padding:8px;margin:5px;}
#chartSection{display:none;}
.adminOnly{display:none;}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  background:#1e1e1e;
}
th,td{
  padding:8px;
  text-align:center;
  border-bottom:1px solid #333;
}
th{background:#222;}
.up{color:#00ff88;font-weight:bold;}
.down{color:#ff4444;font-weight:bold;}
.flat{color:#aaa;}
.latest{background:#1a2f1f;font-weight:bold;}
</style>
</head>
<body>

<h2>📈 템 시세 시스템</h2>

<div id="loginBox">
<input type="text" id="username" placeholder="아이디">
<input type="password" id="password" placeholder="비밀번호">
<button onclick="login()">로그인</button>
</div>

<div id="chartSection">
<button onclick="logout()">로그아웃</button>
<p id="roleText"></p>

<select id="itemSelect"></select>

<select id="viewMode">
<option value="daily">일별</option>
<option value="weekly">주별</option>
<option value="monthly">월별</option>
<option value="yearly">연별</option>
</select>

<div class="adminOnly">
<input type="date" id="date">
<input type="number" id="price" placeholder="시세 입력">
<button onclick="addPrice()">시세 추가</button>
</div>

<h3 id="basePriceText"></h3>

<canvas id="chart"></canvas>

<h3>📋 시세 기록표</h3>
<table>
<thead>
<tr>
<th>날짜</th>
<th>가격</th>
<th>기준대비</th>
<th>등락률</th>
</tr>
</thead>
<tbody id="dataTable"></tbody>
</table>

</div>

<script>

const BASE_DATE = "2026-03-10";

const ACCOUNTS = {
  "admin": { password: "candle0627!!", role: "admin" },
  "user": { password: "0627!!", role: "user" }
};

const items = ["부품A","부품B","번개","도끼","보름","송편","한우","마초","미고"];

let storage = JSON.parse(localStorage.getItem("marketData")) || {};
let currentRole = null;

items.forEach(i=>{
  if(!storage[i]) storage[i]=[];
  let opt=document.createElement("option");
  opt.value=i;
  opt.text=i;
  itemSelect.appendChild(opt);
});

localStorage.setItem("marketData",JSON.stringify(storage));

let chart = new Chart(document.getElementById("chart"),{
  type:'line',
  data:{labels:[],datasets:[{label:'',data:[],borderWidth:2,tension:0.2}]},
  options:{responsive:true}
});

function login(){
  const u=username.value;
  const p=password.value;
  if(ACCOUNTS[u] && ACCOUNTS[u].password===p){
    localStorage.setItem("loginUser",u);
    currentRole=ACCOUNTS[u].role;
    showApp();
  }else alert("로그인 실패");
}

function logout(){
  localStorage.removeItem("loginUser");
  location.reload();
}

function showApp(){
  loginBox.style.display="none";
  chartSection.style.display="block";
  roleText.innerText="권한: "+currentRole;
  if(currentRole==="admin") document.querySelector(".adminOnly").style.display="block";
  loadChart();
}

function groupData(data,mode){
  if(mode==="daily") return data;

  let grouped={};

  data.forEach(d=>{
    let key;
    const date=new Date(d.date);

    if(mode==="weekly"){
      const first=new Date(date.getFullYear(),0,1);
      const week=Math.ceil((((date-first)/86400000)+first.getDay()+1)/7);
      key=date.getFullYear()+"-W"+week;
    }
    if(mode==="monthly") key=date.getFullYear()+"-"+(date.getMonth()+1);
    if(mode==="yearly") key=date.getFullYear();

    if(!grouped[key]) grouped[key]=[];
    grouped[key].push(Number(d.price));
  });

  return Object.keys(grouped).map(k=>{
    const avg=grouped[k].reduce((a,b)=>a+b,0)/grouped[k].length;
    return {date:k,price:avg.toFixed(2)};
  });
}

function loadChart(){
  const item=itemSelect.value;
  const mode=viewMode.value;

  let data=[...storage[item]].sort((a,b)=>new Date(a.date)-new Date(b.date));

  const baseEntry=data.find(d=>d.date===BASE_DATE);
  const basePrice=baseEntry?Number(baseEntry.price):null;

  if(basePrice) basePriceText.innerText="3/10 기준가: "+basePrice;
  else basePriceText.innerText="3/10 기준가 없음";

  let displayData=groupData(data,mode);

  chart.data.labels=displayData.map(d=>d.date);
  chart.data.datasets[0].data=displayData.map(d=>d.price);
  chart.data.datasets[0].label=item+" ("+mode+")";
  chart.update();

  updateTable(data,basePrice);
}

function updateTable(data,basePrice){
  data=[...data].sort((a,b)=>new Date(b.date)-new Date(a.date));
  dataTable.innerHTML="";

  data.forEach((d,i)=>{
    let diff="",percent="",className="flat";

    if(basePrice){
      const change=d.price-basePrice;
      const rate=((change/basePrice)*100).toFixed(2);
      diff=(change>0?"+":"")+change;
      percent=(change>0?"+":"")+rate+"%";
      if(change>0) className="up";
      else if(change<0) className="down";
    }

    dataTable.innerHTML+=`
      <tr class="${i===0?'latest':''}">
        <td>${d.date}</td>
        <td>${d.price}</td>
        <td class="${className}">${diff}</td>
        <td class="${className}">${percent}</td>
      </tr>
    `;
  });
}

function addPrice(){
  if(currentRole!=="admin") return alert("관리자만 가능");
  const item=itemSelect.value;
  const date=document.getElementById("date").value;
  const price=Number(document.getElementById("price").value);
  if(!date||!price) return alert("입력 필요");

  storage[item].push({date,price});
  localStorage.setItem("marketData",JSON.stringify(storage));
  loadChart();
}

itemSelect.onchange=loadChart;
viewMode.onchange=loadChart;

window.onload=function(){
  const saved=localStorage.getItem("loginUser");
  if(saved && ACCOUNTS[saved]){
    currentRole=ACCOUNTS[saved].role;
    showApp();
  }
};

</script>
</body>
</html>
