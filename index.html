<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>템 시세 시스템</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#111;color:white;font-family:sans-serif;padding:20px;}
input,button,select{padding:8px;margin:5px;}
#chartSection{display:none;}
.adminOnly{display:none;}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  background:#1e1e1e;
}
th,td{
  padding:8px;
  text-align:center;
  border-bottom:1px solid #333;
}
th{background:#222;}
.up{color:#00ff88;font-weight:bold;}
.down{color:#ff4444;font-weight:bold;}
.flat{color:#aaa;}
.latest{background:#1a2f1f;font-weight:bold;}
</style>
</head>
<body>

<h2>📈 템 시세 시스템</h2>

<div id="loginBox">
<input type="text" id="username" placeholder="아이디">
<input type="password" id="password" placeholder="비밀번호">
<button onclick="login()">로그인</button>
</div>

<div id="chartSection">
<button onclick="logout()">로그아웃</button>
<p id="roleText"></p>

<select id="itemSelect"></select>

<select id="viewMode">
  <option value="daily">일별</option>
  <option value="weekly">주별</option>
  <option value="monthly">월별</option>
  <option value="yearly">연별</option>
</select>

<p id="basePriceText"></p>

<div class="adminOnly">
<input type="date" id="date">
<input type="number" step="0.01" id="price" placeholder="시세 입력">
<button onclick="addPrice()">시세 추가</button>
</div>

<canvas id="chart"></canvas>

<h3>📋 시세 기록표 (최신 위)</h3>
<table>
<thead>
<tr>
<th>날짜</th>
<th>가격</th>
<th>기준대비</th>
<th>등락률</th>
</tr>
</thead>
<tbody id="dataTable"></tbody>
</table>

</div>

<script>

// 🔐 계정
const ACCOUNTS={
  admin:{password:"candle0627!!",role:"admin"},
  user:{password:"0627!!",role:"user"}
};

const BASE_DATE="2026-03-10";

const BASE_PRICES={
  "부품A":0,
  "부품B":2.0,
  "번개":13,
  "도끼":4,
  "보름":0.15,
  "송편":0.09,
  "한우":0.5,
  "마초":0.08,
  "미고":0.07
};

const items=Object.keys(BASE_PRICES);

let storage=JSON.parse(localStorage.getItem("marketData"))||{};
let currentRole=null;

const itemSelect=document.getElementById("itemSelect");
const viewMode=document.getElementById("viewMode");
const dataTable=document.getElementById("dataTable");
const basePriceText=document.getElementById("basePriceText");

items.forEach(i=>{
  if(!storage[i]) storage[i]=[];
  let opt=document.createElement("option");
  opt.value=i;
  opt.text=i;
  itemSelect.appendChild(opt);
});

localStorage.setItem("marketData",JSON.stringify(storage));

let chart=new Chart(document.getElementById("chart"),{
  type:'line',
  data:{labels:[],datasets:[{label:'',data:[],borderWidth:2,tension:0.2}]},
  options:{responsive:true}
});

function login(){
  const u=username.value;
  const p=password.value;
  if(ACCOUNTS[u]&&ACCOUNTS[u].password===p){
    localStorage.setItem("loginUser",u);
    currentRole=ACCOUNTS[u].role;
    showApp();
  }else alert("로그인 실패");
}

function logout(){
  localStorage.removeItem("loginUser");
  location.reload();
}

function showApp(){
  loginBox.style.display="none";
  chartSection.style.display="block";
  roleText.innerText="권한: "+currentRole;
  if(currentRole==="admin")
    document.querySelector(".adminOnly").style.display="block";
  loadChart();
}

function groupData(data,mode){
  if(mode==="daily") return data;

  const grouped={};

  data.forEach(d=>{
    const date=new Date(d.date);
    let key;

    if(mode==="weekly"){
      const first=new Date(date.getFullYear(),0,1);
      const week=Math.ceil((((date-first)/86400000)+first.getDay()+1)/7);
      key=date.getFullYear()+"-W"+week;
    }
    if(mode==="monthly")
      key=date.getFullYear()+"-"+(date.getMonth()+1);
    if(mode==="yearly")
      key=date.getFullYear();

    grouped[key]=d;
  });

  return Object.entries(grouped).map(([k,v])=>({date:k,price:v.price}));
}

function loadChart(){
  const item=itemSelect.value;
  const mode=viewMode.value;

  let data=[...storage[item]];

  // 🔥 기준가 없으면 자동 삽입
  if(!data.find(d=>d.date===BASE_DATE)){
    data.push({date:BASE_DATE,price:BASE_PRICES[item]});
    storage[item]=data;
    localStorage.setItem("marketData",JSON.stringify(storage));
  }

  data.sort((a,b)=>new Date(a.date)-new Date(b.date));

  const basePrice=Number(BASE_PRICES[item]);
  basePriceText.innerText="3/10 기준가: "+basePrice;

  let displayData=groupData(data,mode);

  chart.data.labels=displayData.map(d=>d.date);
  chart.data.datasets[0].data=displayData.map(d=>Number(d.price));
  chart.data.datasets[0].label=item+" ("+mode+")";

  if(displayData.length>1){
    const last=displayData.at(-1).price;
    const prev=displayData.at(-2).price;
    chart.data.datasets[0].borderColor=
      last>=prev?"#00ff88":"#ff4444";
  }

  chart.update();
  updateTable(data,basePrice);
}

function updateTable(data,basePrice){
  // 🔥 최신 위로 내림차순
  data=[...data].sort((a,b)=>new Date(b.date)-new Date(a.date));
  dataTable.innerHTML="";

  data.forEach((d,i)=>{
    let change=Number(d.price)-basePrice;
    let diff=(change>0?"+":"")+change.toFixed(2);
    let percent=basePrice!==0
      ?(change>0?"+":"")+((change/basePrice)*100).toFixed(2)+"%"
      :"0%";

    let className="flat";
    if(change>0) className="up";
    else if(change<0) className="down";

    dataTable.innerHTML+=`
      <tr class="${i===0?'latest':''}">
        <td>${d.date}</td>
        <td>${Number(d.price)}</td>
        <td class="${className}">${diff}</td>
        <td class="${className}">${percent}</td>
      </tr>
    `;
  });
}

function addPrice(){
  if(currentRole!=="admin"){
    alert("관리자만 가능");
    return;
  }
  const item=itemSelect.value;
  const date=document.getElementById("date").value;
  const price=document.getElementById("price").value;

  if(!date||!price){
    alert("날짜랑 가격 입력");
    return;
  }

  storage[item].push({date,price});
  localStorage.setItem("marketData",JSON.stringify(storage));
  loadChart();
}

itemSelect.addEventListener("change",loadChart);
viewMode.addEventListener("change",loadChart);

window.onload=function(){
  const saved=localStorage.getItem("loginUser");
  if(saved&&ACCOUNTS[saved]){
    currentRole=ACCOUNTS[saved].role;
    showApp();
  }
};

</script>

</body>
</html>
